kind = "web"
previewPath = "/"
title = "FinTrack"
version = "1.0.0"
id = "artifacts/fintrack"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23162

[services.development]
run = "pnpm --filter @workspace/fintrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintrack", "run", "build" ]
serve = "static"
publicDir = "artifacts/fintrack/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23162"
BASE_PATH = "/"
